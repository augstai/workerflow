<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workerflow</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <main class="shell">
      <section class="pill">
        <div class="pulse" id="pulse"></div>
        <div class="pill-copy">
          <div class="status" id="status">Ready</div>
          <div class="meta" id="meta">Codex · current repo</div>
        </div>
        <div class="provider-chip" id="providerChip">Mock</div>
      </section>

      <section class="panel">
        <div class="repo-row">
          <button class="repo" id="repo" type="button">workerflow</button>
          <select id="agent" aria-label="Agent">
            <option value="codex">Codex</option>
            <option value="claude">Claude</option>
          </select>
        </div>

        <div class="voice-stage" id="voiceStage">
          <div class="voice-copy">
            <div class="eyebrow">Voice</div>
            <div class="voice-state" id="voiceState">Idle</div>
          </div>
          <div class="wave" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <button class="voice-test" id="voiceTest" type="button">Test voice</button>
        </div>

        <textarea id="task" spellcheck="false" placeholder="Say or type a task"></textarea>
        <div class="transcript" id="transcript"></div>

        <div class="confirm" id="confirm" hidden>
          <div>
            <div class="eyebrow">Task understood</div>
            <div class="confirm-title" id="confirmTitle"></div>
          </div>
          <div class="confirm-grid">
            <span id="confirmAgent">Codex</span>
            <span id="confirmRepo">repo</span>
            <span id="confirmBranch">branch</span>
            <span id="confirmRisk">risk</span>
          </div>
        </div>

        <div class="result" id="result"></div>

        <div class="result-panel" id="resultPanel" hidden>
          <div class="result-head">
            <div>
              <div class="eyebrow">Result</div>
              <div class="result-title" id="resultTitle"></div>
            </div>
            <button id="openArtifacts" type="button">Artifacts</button>
          </div>
          <div class="stats">
            <div>
              <span>Files</span>
              <strong id="filesCount">0</strong>
            </div>
            <div>
              <span>Checks</span>
              <strong id="checksState">-</strong>
            </div>
          </div>
          <pre id="filesList"></pre>
          <pre id="checksList"></pre>
        </div>

        <details class="settings">
          <summary>Settings</summary>
          <div class="settings-grid">
            <label>
              <span>Hotkey</span>
              <input id="hotkey" value="Alt+Space" />
            </label>
            <label>
              <span>Mode</span>
              <select id="hotkeyMode">
                <option value="toggle">Toggle</option>
                <option value="hold">Hold</option>
              </select>
            </label>
            <label>
              <span>Transcription</span>
              <select id="provider">
                <option value="mock">Mock</option>
                <option value="openai">OpenAI</option>
                <option value="azure-openai">Azure OpenAI</option>
                <option value="elevenlabs">ElevenLabs</option>
                <option value="openai-compatible">OpenAI-compatible</option>
              </select>
            </label>
            <label>
              <span>Model</span>
              <input id="model" value="gpt-4o-mini-transcribe" />
            </label>
            <label>
              <span id="endpointLabel">Endpoint</span>
              <input id="endpoint" value="https://api.openai.com/v1" />
            </label>
            <label>
              <span id="deploymentLabel">Deployment</span>
              <input id="deployment" value="" />
            </label>
            <label>
              <span>Key env</span>
              <input id="keyEnv" value="OPENAI_API_KEY" />
            </label>
          </div>
        </details>

        <div class="toolbar">
          <button id="stop" type="button">Stop</button>
          <button id="review" type="button">Review</button>
          <button id="run" type="button" disabled>Run</button>
        </div>
      </section>
    </main>
    <script src="./overlay.js"></script>
  </body>
</html>
